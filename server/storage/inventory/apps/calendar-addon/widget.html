<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calendar Widget</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #101422;
        --muted: #697086;
        --line: rgba(118, 127, 154, 0.22);
        --panel: rgba(255, 255, 255, 0.62);
        --panel-strong: rgba(255, 255, 255, 0.82);
        --theme-primary: #9c64ff;
        --theme-primary-strong: #7a46e8;
        --agenda-add-start: #9c64ff;
        --agenda-add-end: #7a46e8;
        --today-fill-start: rgba(157, 100, 255, 0.4);
        --today-fill-end: rgba(123, 74, 230, 0.38);
        --today-text: #ffffff;
        --today-number-bg: rgba(123, 74, 230, 0.26);
        --warm: #f28b24;
        --danger: #b42318;
        --sunday: #c7362f;
        --saturday: #4169e1;
        font-family: "Aptos Display", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        color: var(--ink);
      }

      body {
        background:
          radial-gradient(circle at 78% 16%, rgba(255, 242, 231, 0.96) 0 18%, rgba(255, 242, 231, 0) 44%),
          radial-gradient(circle at 16% 10%, rgba(205, 218, 255, 0.95) 0 21%, rgba(205, 218, 255, 0) 48%),
          linear-gradient(140deg, #c9d3f2 0%, #f5f1fb 45%, #ffe9df 100%);
      }

      .widget {
        width: 100%;
        height: 100%;
        min-width: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 10px;
        padding: clamp(12px, 4vw, 16px);
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 12px;
      }

      .eyebrow {
        margin: 0 0 2px;
        color: var(--theme-primary-strong);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1;
        letter-spacing: 0;
      }

      button {
        border: 0;
        font: inherit;
        cursor: pointer;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
      }

      .nav-btn,
      .today-btn,
      .open-btn {
        min-height: 30px;
        border-radius: 10px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.62);
        box-shadow: 0 8px 18px rgba(66, 75, 112, 0.1);
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .nav-btn {
        width: 32px;
        font-size: 18px;
        line-height: 1;
      }

      .today-btn {
        padding: 0 10px;
        color: #fff;
        background: linear-gradient(135deg, var(--theme-primary), var(--theme-primary-strong));
        font-size: 11px;
        font-weight: 900;
      }

      .open-btn {
        padding: 0 9px;
        font-size: 11px;
        font-weight: 900;
      }

      .nav-btn:hover,
      .today-btn:hover,
      .open-btn:hover {
        transform: translateY(-1px);
      }

      .date-pill {
        min-width: 54px;
        padding: 8px 10px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 16px;
        background: var(--panel-strong);
        box-shadow: 0 12px 28px rgba(59, 85, 78, 0.16);
        text-align: center;
      }

      .date-pill span {
        display: block;
      }

      .date-pill .weekday {
        color: var(--muted);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .date-pill .day {
        color: var(--theme-primary-strong);
        font-size: 22px;
        font-weight: 950;
        line-height: 1;
      }

      .content {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(118px, 0.72fr) minmax(0, 1fr);
        gap: 10px;
      }

      .card {
        min-width: 0;
        min-height: 0;
        border: 1px solid rgba(255, 255, 255, 0.66);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 18px 40px rgba(42, 50, 88, 0.15);
        backdrop-filter: blur(18px) saturate(1.12);
      }

      .month-card {
        display: grid;
        align-content: start;
        gap: 8px;
        padding: 11px;
      }

      .weekdays,
      .month-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 3px;
      }

      .weekdays {
        color: var(--muted);
        font-size: 9px;
        font-weight: 900;
        text-align: center;
        text-transform: uppercase;
      }

      .day-cell {
        position: relative;
        min-height: 21px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 8px;
        color: rgba(21, 32, 51, 0.74);
        background: transparent;
        font-size: 11px;
        font-weight: 850;
        cursor: pointer;
        transition: background 140ms ease, box-shadow 140ms ease, transform 140ms ease;
      }

      .day-cell:hover {
        background: rgba(255, 255, 255, 0.5);
        transform: translateY(-1px);
      }

      .day-cell.muted {
        color: rgba(102, 112, 133, 0.38);
      }

      .weekdays span:first-child,
      .day-cell.sun {
        color: var(--sunday);
      }

      .weekdays span:last-child,
      .day-cell.sat {
        color: var(--saturday);
      }

      .day-cell.muted.sun,
      .day-cell.muted.sat {
        opacity: 0.45;
      }

      .day-cell.today {
        color: var(--today-text);
        background: linear-gradient(135deg, var(--today-fill-start), var(--today-fill-end));
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28), 0 8px 16px rgba(128, 79, 231, 0.18);
      }

      .day-cell.has-events::after {
        content: "";
        position: absolute;
        right: 4px;
        bottom: 3px;
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: var(--warm);
      }

      .day-cell.today.has-events::after {
        background: #fff2c8;
      }

      .day-cell.selected {
        box-shadow: inset 0 0 0 2px var(--theme-primary-strong), 0 8px 16px rgba(128, 79, 231, 0.14);
      }

      .agenda-card {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        padding: 12px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .section-title strong {
        min-width: 0;
        overflow: hidden;
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .count {
        flex: 0 0 auto;
        padding: 3px 7px;
        border-radius: 999px;
        color: #fff;
        background: linear-gradient(135deg, var(--theme-primary), var(--theme-primary-strong));
        font-size: 10px;
        font-weight: 900;
      }

      .events {
        min-height: 0;
        display: grid;
        align-content: start;
        gap: 7px;
        overflow: auto;
        padding-right: 2px;
      }

      .event {
        display: grid;
        grid-template-columns: 7px minmax(0, 1fr);
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.48);
        cursor: pointer;
        transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
      }

      .event:hover {
        border-color: rgba(123, 74, 230, 0.28);
        background: rgba(255, 255, 255, 0.64);
        transform: translateY(-1px);
      }

      .event.expanded {
        grid-template-columns: 7px minmax(0, 1fr);
        border-color: rgba(123, 74, 230, 0.34);
        background: rgba(255, 255, 255, 0.72);
      }

      .dot {
        width: 7px;
        height: 7px;
        margin-top: 4px;
        border-radius: 999px;
        background: var(--event-color, var(--theme-primary));
      }

      .event-title {
        min-width: 0;
        overflow: hidden;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .event-time {
        min-width: 0;
        overflow: hidden;
        margin-top: 1px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .event-note {
        grid-column: 2;
        max-height: 72px;
        overflow: auto;
        border-top: 1px solid rgba(118, 127, 154, 0.14);
        padding-top: 7px;
        color: #4c5368;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .empty,
      .status {
        display: grid;
        place-items: center;
        min-height: 64px;
        border: 1px dashed rgba(90, 106, 138, 0.28);
        border-radius: 14px;
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.35;
        text-align: center;
      }

      .status.error {
        border-color: rgba(180, 35, 24, 0.24);
        color: var(--danger);
        background: rgba(255, 244, 242, 0.66);
      }

      .footer {
        margin-top: 8px;
        overflow: hidden;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 300px), (max-height: 215px) {
        .widget {
          gap: 8px;
          padding: 10px;
        }

        .content {
          grid-template-columns: 1fr;
        }

        .month-card {
          display: none;
        }

        .agenda-card {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="widget" aria-live="polite">
      <header class="topbar">
        <div>
          <p class="eyebrow">Calendar</p>
          <h1 id="monthTitle">Loading</h1>
          <div class="toolbar-actions" aria-label="Calendar navigation">
            <button id="prevBtn" class="nav-btn" type="button" aria-label="Previous month">&lt;</button>
            <button id="todayBtn" class="today-btn" type="button">Today</button>
            <button id="nextBtn" class="nav-btn" type="button" aria-label="Next month">&gt;</button>
            <button id="openBtn" class="open-btn" type="button">Open</button>
          </div>
        </div>
        <div class="date-pill" aria-label="Today">
          <span class="weekday" id="weekdayLabel">Today</span>
          <span class="day" id="dayLabel">--</span>
        </div>
      </header>

      <section class="content">
        <aside class="card month-card" aria-label="Current month">
          <div class="weekdays" aria-hidden="true">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
          </div>
          <div class="month-grid" id="monthGrid"></div>
        </aside>

        <section class="card agenda-card" aria-label="Calendar agenda">
          <div class="section-title">
            <strong id="agendaTitle">Today</strong>
            <span class="count" id="eventCount">0</span>
          </div>
          <div class="events" id="eventList">
            <div class="status">Loading this month...</div>
          </div>
          <div class="footer" id="footerText">Read-only dashboard widget</div>
        </section>
      </section>
    </main>

    <script src="/api/sandbox/sdk.js" crossorigin="anonymous"></script>
    <script>
      const THEME_STORAGE_PATH = 'settings/theme.json';
      const DEFAULT_THEME = {
        themePrimary: '#9c64ff',
        themePrimaryStrong: '#7a46e8',
        addButtonColor: '#9c64ff',
        todayFillStart: '#9d64ff',
        todayFillEnd: '#7b4ae6'
      };
      const COLOR_FALLBACKS = ['#9c64ff', '#7a46e8', '#4169e1', '#f28b24', '#25a979'];
      const today = startOfToday();
      const state = {
        viewedDate: new Date(today),
        selectedDate: new Date(today),
        expandedEventId: '',
        events: [],
        sources: null
      };

      const els = {
        monthTitle: document.getElementById('monthTitle'),
        weekdayLabel: document.getElementById('weekdayLabel'),
        dayLabel: document.getElementById('dayLabel'),
        prevBtn: document.getElementById('prevBtn'),
        todayBtn: document.getElementById('todayBtn'),
        nextBtn: document.getElementById('nextBtn'),
        openBtn: document.getElementById('openBtn'),
        monthGrid: document.getElementById('monthGrid'),
        agendaTitle: document.getElementById('agendaTitle'),
        eventCount: document.getElementById('eventCount'),
        eventList: document.getElementById('eventList'),
        footerText: document.getElementById('footerText')
      };

      function startOfToday() {
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate());
      }

      function parseDate(value) {
        if (!value) return null;
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function dateKey(date) {
        return [
          date.getFullYear(),
          String(date.getMonth() + 1).padStart(2, '0'),
          String(date.getDate()).padStart(2, '0')
        ].join('-');
      }

      function eventDate(event) {
        return parseDate(event && event.startAt) || new Date(0);
      }

      function eventKey(event, index) {
        return String((event && event.id) || `${eventDate(event).toISOString()}-${index}`);
      }

      function eventColor(event, index) {
        const color = event && typeof event.color === 'string' ? event.color.trim() : '';
        return color || COLOR_FALLBACKS[index % COLOR_FALLBACKS.length];
      }

      function eventTimeLabel(event) {
        if (event && event.allDay) return 'All day';
        const start = eventDate(event);
        const end = parseDate(event && event.endAt);
        const startText = start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        if (!end) return startText;
        const endText = end.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        return `${startText} - ${endText}`;
      }

      function agendaDateLabel(event) {
        const date = eventDate(event);
        if (dateKey(date) === dateKey(today)) return 'Today';
        return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      }

      function friendlyError(err) {
        const code = err && err.code ? `${err.code}: ` : '';
        return `${code}${(err && err.message) || String(err)}`;
      }

      function ensureHexColor(value, fallback) {
        const v = typeof value === 'string' ? value.trim() : '';
        return /^#[0-9a-fA-F]{6}$/.test(v) ? v : fallback;
      }

      function hexToRgba(hex, alpha) {
        const safe = ensureHexColor(hex, '#000000');
        const r = Number.parseInt(safe.slice(1, 3), 16);
        const g = Number.parseInt(safe.slice(3, 5), 16);
        const b = Number.parseInt(safe.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function normalizeTheme(input) {
        const parsed = input && typeof input === 'object' ? input : {};
        return {
          themePrimary: ensureHexColor(parsed.themePrimary, DEFAULT_THEME.themePrimary),
          themePrimaryStrong: ensureHexColor(parsed.themePrimaryStrong, DEFAULT_THEME.themePrimaryStrong),
          addButtonColor: ensureHexColor(parsed.addButtonColor, DEFAULT_THEME.addButtonColor),
          todayFillStart: ensureHexColor(parsed.todayFillStart, DEFAULT_THEME.todayFillStart),
          todayFillEnd: ensureHexColor(parsed.todayFillEnd, DEFAULT_THEME.todayFillEnd)
        };
      }

      function applyTheme(theme) {
        const root = document.documentElement.style;
        root.setProperty('--theme-primary', theme.themePrimary);
        root.setProperty('--theme-primary-strong', theme.themePrimaryStrong);
        root.setProperty('--today-fill-start', hexToRgba(theme.todayFillStart, 0.4));
        root.setProperty('--today-fill-end', hexToRgba(theme.todayFillEnd, 0.38));
        root.setProperty('--today-number-bg', hexToRgba(theme.todayFillEnd, 0.26));
        root.setProperty('--agenda-add-start', theme.addButtonColor);
        root.setProperty('--agenda-add-end', theme.themePrimaryStrong);
      }

      async function readTheme() {
        try {
          const listResult = await window.WebOS.app.data.list({ path: 'settings' });
          const entries = Array.isArray(listResult && listResult.entries) ? listResult.entries : [];
          const hasThemeFile = entries.some((entry) => entry && entry.type === 'file' && entry.name === 'theme.json');
          if (!hasThemeFile) return { ...DEFAULT_THEME };

          const result = await window.WebOS.app.data.read({ path: THEME_STORAGE_PATH });
          const raw = result && typeof result.content === 'string' ? result.content : '';
          return raw ? normalizeTheme(JSON.parse(raw)) : { ...DEFAULT_THEME };
        } catch (_err) {
          return { ...DEFAULT_THEME };
        }
      }

      function sourceSummary(sources) {
        if (!sources || typeof sources !== 'object') return 'Calendar ready';
        const values = Object.values(sources).filter(Boolean);
        const warnings = values.filter((source) => source.status && !['fresh', 'cache', 'ok'].includes(source.status));
        if (warnings.length) return `${warnings.length} source warning${warnings.length === 1 ? '' : 's'}`;
        const providerCount = values.filter((source) => source.type && source.type !== 'local').length;
        return providerCount ? `${providerCount} provider source${providerCount === 1 ? '' : 's'} merged` : 'Calendar ready';
      }

      function renderMonthGrid() {
        const monthStart = new Date(state.viewedDate.getFullYear(), state.viewedDate.getMonth(), 1);
        const gridStart = new Date(monthStart);
        gridStart.setDate(gridStart.getDate() - gridStart.getDay());
        const eventDays = new Set(state.events.map((event) => dateKey(eventDate(event))));
        const todayKey = dateKey(today);
        els.monthGrid.innerHTML = '';

        for (let index = 0; index < 42; index += 1) {
          const date = new Date(gridStart);
          date.setDate(gridStart.getDate() + index);
          const key = dateKey(date);
          const cell = document.createElement('div');
          cell.className = 'day-cell';
          cell.role = 'button';
          cell.tabIndex = 0;
          cell.setAttribute('aria-label', date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }));
          if (date.getMonth() !== state.viewedDate.getMonth()) cell.classList.add('muted');
          if (date.getDay() === 0) cell.classList.add('sun');
          if (date.getDay() === 6) cell.classList.add('sat');
          if (key === todayKey) cell.classList.add('today');
          if (key === dateKey(state.selectedDate)) cell.classList.add('selected');
          if (eventDays.has(key)) cell.classList.add('has-events');
          cell.textContent = String(date.getDate());
          cell.addEventListener('click', () => selectDate(date));
          cell.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              selectDate(date);
            }
          });
          els.monthGrid.appendChild(cell);
        }
      }

      function renderEvents() {
        const selectedKey = dateKey(state.selectedDate);
        const sorted = [...state.events].sort((a, b) => eventDate(a) - eventDate(b));
        const monthStart = new Date(state.viewedDate.getFullYear(), state.viewedDate.getMonth(), 1);
        const monthEnd = new Date(state.viewedDate.getFullYear(), state.viewedDate.getMonth() + 1, 1);
        const monthEvents = sorted.filter((event) => {
          const date = eventDate(event);
          return date >= monthStart && date < monthEnd;
        });
        const selectedEvents = monthEvents.filter((event) => dateKey(eventDate(event)) === selectedKey);
        const displayEvents = selectedEvents.slice(0, 5);
        els.agendaTitle.textContent = state.selectedDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        els.eventCount.textContent = String(selectedEvents.length);
        els.eventList.innerHTML = '';

        if (!displayEvents.length) {
          els.eventList.innerHTML = '<div class="empty">No events on this date.</div>';
          return;
        }

        displayEvents.slice(0, 5).forEach((event, index) => {
          const row = document.createElement('article');
          const dot = document.createElement('span');
          const body = document.createElement('div');
          const title = document.createElement('div');
          const time = document.createElement('div');
          const key = eventKey(event, index);
          const expanded = state.expandedEventId === key;

          row.className = expanded ? 'event expanded' : 'event';
          row.role = 'button';
          row.tabIndex = 0;
          row.title = 'Toggle event note';
          dot.className = 'dot';
          dot.style.setProperty('--event-color', eventColor(event, index));
          title.className = 'event-title';
          title.textContent = event.title || 'Untitled event';
          time.className = 'event-time';
          time.textContent = `${agendaDateLabel(event)} · ${eventTimeLabel(event)}`;
          row.addEventListener('click', () => toggleEvent(key));
          row.addEventListener('keydown', (keyboardEvent) => {
            if (keyboardEvent.key === 'Enter' || keyboardEvent.key === ' ') {
              keyboardEvent.preventDefault();
              toggleEvent(key);
            }
          });

          body.appendChild(title);
          body.appendChild(time);
          row.appendChild(dot);
          row.appendChild(body);
          if (expanded) {
            const note = document.createElement('div');
            note.className = 'event-note';
            note.textContent = event.note || 'No note.';
            row.appendChild(note);
          }
          els.eventList.appendChild(row);
        });
      }

      function toggleEvent(key) {
        state.expandedEventId = state.expandedEventId === key ? '' : key;
        renderEvents();
      }

      function selectDate(date) {
        state.selectedDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        state.expandedEventId = '';
        if (state.selectedDate.getMonth() !== state.viewedDate.getMonth() || state.selectedDate.getFullYear() !== state.viewedDate.getFullYear()) {
          state.viewedDate = new Date(state.selectedDate.getFullYear(), state.selectedDate.getMonth(), 1);
          loadMonth(0);
          return;
        }
        render();
      }

      function render() {
        els.monthTitle.textContent = state.viewedDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        els.weekdayLabel.textContent = today.toLocaleDateString('en-US', { weekday: 'short' });
        els.dayLabel.textContent = String(today.getDate());
        els.footerText.textContent = sourceSummary(state.sources);
        renderMonthGrid();
        renderEvents();
      }

      function setError(err) {
        els.eventCount.textContent = '!';
        els.eventList.innerHTML = '';
        const status = document.createElement('div');
        status.className = 'status error';
        status.textContent = friendlyError(err);
        els.eventList.appendChild(status);
        els.footerText.textContent = 'Calendar read failed';
      }

      async function boot() {
        render();
        try {
          await window.WebOS.ready();
          applyTheme(await readTheme());
          els.prevBtn.addEventListener('click', () => loadMonth(-1));
          els.nextBtn.addEventListener('click', () => loadMonth(1));
          els.todayBtn.addEventListener('click', () => {
            state.viewedDate = new Date(today);
            state.selectedDate = new Date(today);
            state.expandedEventId = '';
            loadMonth(0);
          });
          els.openBtn.addEventListener('click', () => {
            window.WebOS.window.open('calendar-addon', {
              source: 'calendar-widget',
              viewedYear: state.viewedDate.getFullYear(),
              viewedMonth: state.viewedDate.getMonth() + 1
            }).catch(setError);
          });
          await loadMonth(0);
        } catch (err) {
          state.events = [];
          renderMonthGrid();
          setError(err);
        }
      }

      async function loadMonth(offset) {
        if (offset) {
          state.viewedDate = new Date(state.viewedDate.getFullYear(), state.viewedDate.getMonth() + offset, 1);
          state.selectedDate = new Date(state.viewedDate);
          state.expandedEventId = '';
        }
        render();
        try {
          const result = await window.WebOS.calendar.month({
            year: state.viewedDate.getFullYear(),
            month: state.viewedDate.getMonth() + 1
          });
          state.events = Array.isArray(result && result.data) ? result.data : [];
          state.sources = result && result.sources;
          render();
        } catch (err) {
          state.events = [];
          renderMonthGrid();
          setError(err);
        }
      }

      boot();
    </script>
  </body>
</html>
