services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: webos-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: "production"
      JWT_SECRET: "change-me-in-production"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin"
      ALLOWED_ROOTS: '["/workspace/data","/workspace/media"]'
      INITIAL_PATH: "/workspace/data"
      INDEX_DEPTH: "5"
    volumes:
      - webos_storage:/app/server/storage
      - ./data:/workspace/data
      - ./media:/workspace/media
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          const http = require('http');
          const req = http.get('http://127.0.0.1:3000/health', (res) => {
            process.exit(res.statusCode === 200 ? 0 : 1);
          });
          req.on('error', () => process.exit(1));
          req.setTimeout(2000, () => { req.destroy(); process.exit(1); });
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: webos-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_DEV_PROXY_TARGET: "http://backend:3000"
    ports:
      - "5173:5173"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          const http = require('http');
          const req = http.get('http://127.0.0.1:5173', (res) => {
            process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1);
          });
          req.on('error', () => process.exit(1));
          req.setTimeout(3000, () => { req.destroy(); process.exit(1); });
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  webos_storage:
