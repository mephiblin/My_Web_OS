services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: webos-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: "production"
      JWT_SECRET: "change-me-in-production"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin"
      ALLOWED_ROOTS: '["/workspace/data","/workspace/media"]'
      INITIAL_PATH: "/workspace/data"
      INDEX_DEPTH: "5"
    volumes:
      - webos_storage:/app/server/storage
      - ./data:/workspace/data
      - ./media:/workspace/media
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: webos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_DEV_PROXY_TARGET: "http://backend:3000"
    ports:
      - "5173:5173"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  webos_storage:
