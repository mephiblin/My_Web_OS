<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Code Editor</title>
    <style>
      :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
      body { margin: 0; height: 100vh; display: grid; grid-template-rows: 44px 1fr 28px; background: #111827; color: #e5e7eb; }
      header, footer { display: flex; align-items: center; gap: 10px; padding: 0 12px; background: #0f172a; border-bottom: 1px solid #253044; }
      footer { border-top: 1px solid #253044; border-bottom: 0; color: #94a3b8; font-size: 12px; }
      .title { min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
      button { border: 1px solid #2563eb; border-radius: 8px; background: #1d4ed8; color: white; padding: 7px 12px; cursor: pointer; }
      button:disabled { opacity: .45; cursor: not-allowed; }
      textarea { width: 100%; height: 100%; box-sizing: border-box; resize: none; border: 0; outline: 0; padding: 16px; background: #020617; color: #dbeafe; font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </head>
  <body>
    <header>
      <div class="title" id="title">Code Editor</div>
      <button id="save">Save</button>
    </header>
    <textarea id="editor" spellcheck="false"></textarea>
    <footer id="status">Waiting for file context...</footer>
    <script src="/api/sandbox/sdk.js"></script>
    <script>
      const titleEl = document.getElementById('title');
      const editorEl = document.getElementById('editor');
      const saveEl = document.getElementById('save');
      const statusEl = document.getElementById('status');
      let active = null;

      function setStatus(value) { statusEl.textContent = value; }

      async function save() {
        if (!active) return;
        if (active.mode === 'read') {
          setStatus('Read-only grant. Save blocked.');
          return;
        }
        try {
          await window.WebOS.files.write({
            path: active.path,
            grantId: active.grantId,
            content: editorEl.value,
            overwrite: true,
            approval: { approved: true, reason: 'sandbox-editor-save' }
          });
          setStatus('Saved.');
        } catch (err) {
          setStatus(err?.message || 'Save failed.');
        }
      }

      async function boot() {
        try {
          const context = await window.WebOS.ready();
          const launchData = context?.app?.launchData || {};
          const file = launchData?.fileContext?.file || {};
          const grant = launchData?.fileContext?.permissionContext || {};
          const path = file.path || launchData.path || '';
          const grantId = grant.grantId || '';
          titleEl.textContent = file.name || path.split('/').pop() || 'Code Editor';
          if (!path || !grantId) {
            setStatus('File path or grant is missing.');
            saveEl.disabled = true;
            return;
          }
          const result = await window.WebOS.files.read({ path, grantId });
          editorEl.value = String(result?.content || '');
          active = { path, grantId, mode: file.mode || 'readwrite' };
          saveEl.disabled = active.mode === 'read';
          setStatus(active.mode === 'read' ? 'Opened read-only.' : 'Ready.');
        } catch (err) {
          saveEl.disabled = true;
          setStatus(err?.message || 'Failed to open file.');
        }
      }

      saveEl.addEventListener('click', save);
      window.addEventListener('keydown', (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
          event.preventDefault();
          save();
        }
      });
      boot();
    </script>
  </body>
</html>
