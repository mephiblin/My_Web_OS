<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>코드 에디터</title>
    <style>
      :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        grid-template-rows: 46px 1fr 30px;
        background: radial-gradient(circle at 20% 0%, #17263f 0%, #0b1220 48%, #060b14 100%);
        color: #e5e7eb;
      }
      header, footer {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 12px;
        background: rgba(15, 23, 42, 0.6);
        border-bottom: 1px solid rgba(148, 163, 184, 0.26);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      footer {
        border-top: 1px solid rgba(148, 163, 184, 0.22);
        border-bottom: 0;
        color: #94a3b8;
        font-size: 12px;
      }
      .title { min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
      button {
        border: 1px solid rgba(125, 211, 252, 0.5);
        border-radius: 8px;
        background: rgba(37, 99, 235, 0.72);
        color: white;
        padding: 7px 12px;
        cursor: pointer;
      }
      button:disabled { opacity: .45; cursor: not-allowed; }
      textarea {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        resize: none;
        border: 0;
        outline: 0;
        padding: 16px;
        background: rgba(2, 6, 23, 0.78);
        color: #dbeafe;
        font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title" id="title">코드 에디터</div>
      <button id="save">저장</button>
    </header>
    <textarea id="editor" spellcheck="false"></textarea>
    <footer id="status">파일 컨텍스트를 기다리는 중...</footer>
    <script src="/api/sandbox/sdk.js" crossorigin="anonymous"></script>
    <script>
      const titleEl = document.getElementById('title');
      const editorEl = document.getElementById('editor');
      const saveEl = document.getElementById('save');
      const statusEl = document.getElementById('status');
      let active = null;

      function setStatus(value) { statusEl.textContent = value; }

      async function save() {
        if (!active) return;
        if (active.mode === 'read') {
          setStatus('읽기 전용 권한입니다. 저장할 수 없습니다.');
          return;
        }
        try {
          const preflight = await window.WebOS.files.writePreflight({
            path: active.path,
            grantId: active.grantId
          });
          const typedConfirmation = preflight?.approval?.typedConfirmation || active.path.split('/').pop() || '';
          const approval = await window.WebOS.files.approveWrite({
            path: active.path,
            operationId: preflight?.operationId || '',
            typedConfirmation
          });
          await window.WebOS.files.write({
            path: active.path,
            grantId: active.grantId,
            content: editorEl.value,
            overwrite: true,
            approval: {
              operationId: approval?.operationId || preflight?.operationId || '',
              nonce: approval?.nonce || '',
              targetHash: approval?.targetHash || preflight?.targetHash || ''
            }
          });
          setStatus('저장했습니다.');
        } catch (err) {
          setStatus(err?.message || '저장에 실패했습니다.');
        }
      }

      async function boot() {
        try {
          const context = await window.WebOS.ready();
          const launchData = context?.app?.launchData || {};
          const file = launchData?.fileContext?.file || {};
          const grant = launchData?.fileContext?.permissionContext || {};
          const path = file.path || launchData.path || '';
          const grantId = grant.grantId || '';
          titleEl.textContent = file.name || path.split('/').pop() || '코드 에디터';
          if (!path || !grantId) {
            setStatus('파일 경로 또는 권한이 없습니다.');
            saveEl.disabled = true;
            return;
          }
          const result = await window.WebOS.files.read({ path, grantId });
          editorEl.value = String(result?.content || '');
          active = { path, grantId, mode: file.mode || 'readwrite' };
          saveEl.disabled = active.mode === 'read';
          setStatus(active.mode === 'read' ? '읽기 전용으로 열었습니다.' : '준비되었습니다.');
        } catch (err) {
          saveEl.disabled = true;
          setStatus(err?.message || '파일을 열지 못했습니다.');
        }
      }

      saveEl.addEventListener('click', save);
      window.addEventListener('keydown', (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
          event.preventDefault();
          save();
        }
      });
      boot();
    </script>
  </body>
</html>
