<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Viewer</title>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
    <style>
      :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
      body { margin: 0; height: 100vh; overflow: hidden; background: #050816; color: #e5e7eb; }
      #viewport { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      .toolbar { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; max-width: calc(100vw - 24px); padding: 8px 12px; border: 1px solid rgba(148, 163, 184, .28); border-radius: 14px; background: rgba(15, 23, 42, .78); backdrop-filter: blur(14px); box-shadow: 0 18px 55px rgba(0,0,0,.35); }
      .title { max-width: min(44vw, 520px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 800; }
      button, a { border: 1px solid rgba(125, 211, 252, .55); border-radius: 10px; background: rgba(14, 116, 144, .78); color: white; padding: 7px 10px; text-decoration: none; cursor: pointer; font-size: 12px; }
      button.active { background: #2563eb; border-color: #93c5fd; }
      .panel { position: fixed; top: 14px; right: 14px; width: min(340px, calc(100vw - 28px)); max-height: calc(100vh - 110px); overflow: auto; padding: 12px; border: 1px solid rgba(148, 163, 184, .28); border-radius: 16px; background: rgba(15, 23, 42, .78); backdrop-filter: blur(14px); box-shadow: 0 18px 55px rgba(0,0,0,.35); }
      .panel h2 { margin: 0 0 10px; font-size: 15px; }
      .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
      .metric { padding: 8px; border-radius: 10px; background: rgba(15, 23, 42, .72); border: 1px solid rgba(148, 163, 184, .22); }
      .metric span { display: block; font-size: 11px; color: #94a3b8; }
      .metric strong { font-size: 18px; }
      .material { border-top: 1px solid rgba(148, 163, 184, .18); padding: 8px 0; }
      .material .name { font-weight: 700; font-size: 12px; }
      .material .meta { color: #94a3b8; font-size: 11px; word-break: break-word; }
      .overlay { position: fixed; inset: 0; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(30, 64, 175, .28), rgba(2, 6, 23, .85)); }
      .card { width: min(560px, calc(100vw - 36px)); border: 1px solid rgba(148, 163, 184, .28); border-radius: 18px; padding: 22px; background: rgba(15, 23, 42, .82); text-align: center; }
      .error { color: #fca5a5; }
    </style>
  </head>
  <body>
    <div id="viewport"></div>
    <aside class="panel" id="panel">
      <h2>Inspection</h2>
      <div class="metrics">
        <div class="metric"><span>Meshes</span><strong id="mesh-count">0</strong></div>
        <div class="metric"><span>Triangles</span><strong id="tri-count">0</strong></div>
        <div class="metric"><span>Materials</span><strong id="mat-count">0</strong></div>
      </div>
      <div id="materials"></div>
    </aside>
    <div class="toolbar">
      <div class="title" id="title">Model Viewer</div>
      <button id="wireframe">Wireframe</button>
      <button id="axes" class="active">Axes</button>
      <button id="animation" disabled>Animation: Off</button>
      <button id="fit">Fit</button>
      <button id="shot">Screenshot</button>
      <a id="download" href="#" download>Download</a>
    </div>
    <div class="overlay" id="overlay"><div class="card" id="status">Waiting for file context...</div></div>
    <script src="/api/sandbox/sdk.js"></script>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
      import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

      const viewport = document.getElementById('viewport');
      const overlay = document.getElementById('overlay');
      const statusEl = document.getElementById('status');
      const titleEl = document.getElementById('title');
      const meshCountEl = document.getElementById('mesh-count');
      const triCountEl = document.getElementById('tri-count');
      const matCountEl = document.getElementById('mat-count');
      const materialsEl = document.getElementById('materials');
      const wireframeEl = document.getElementById('wireframe');
      const axesEl = document.getElementById('axes');
      const animationEl = document.getElementById('animation');
      const fitEl = document.getElementById('fit');
      const shotEl = document.getElementById('shot');
      const downloadEl = document.getElementById('download');

      let scene;
      let camera;
      let renderer;
      let controls;
      let model;
      let mixer;
      let axes;
      let frameId;
      let resizeObserver;
      let disposed = false;
      let rawUrl = '';
      let fileName = 'model';
      let wireframe = false;
      let axesVisible = true;
      let animationEnabled = false;
      let animationActions = [];
      const clock = new THREE.Clock();

      function setStatus(message, error = false) {
        statusEl.textContent = message;
        statusEl.className = error ? 'card error' : 'card';
        overlay.style.display = message ? 'grid' : 'none';
      }

      function extOf(path) {
        const name = String(path || '').split('/').pop() || '';
        return name.includes('.') ? name.split('.').pop().toLowerCase() : '';
      }

      function initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050816);
        camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        camera.position.set(5, 5, 5);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.shadowMap.enabled = true;
        viewport.appendChild(renderer.domElement);
        resizeObserver = new ResizeObserver(() => resize());
        resizeObserver.observe(viewport);
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0xffffff, 0.62));
        const key = new THREE.DirectionalLight(0xffffff, 1.1);
        key.position.set(5, 10, 7.5);
        key.castShadow = true;
        scene.add(key);
        const hemi = new THREE.HemisphereLight(0xdbeafe, 0x1e293b, 0.45);
        scene.add(hemi);
        axes = new THREE.AxesHelper(2.5);
        scene.add(axes);
        resize();
      }

      function resize() {
        if (!renderer || !camera) return;
        const width = Math.max(1, viewport.clientWidth);
        const height = Math.max(1, viewport.clientHeight);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height, false);
      }

      function animate() {
        if (disposed) return;
        frameId = requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (animationEnabled && mixer) mixer.update(delta);
        controls?.update();
        renderer?.render(scene, camera);
      }

      function applyWireframe(root, enabled) {
        root?.traverse?.((node) => {
          if (!node?.isMesh || !node.material) return;
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach((material) => {
            if ('wireframe' in material) {
              material.wireframe = enabled;
              material.needsUpdate = true;
            }
          });
        });
      }

      function inspect(root) {
        const materialSet = new Set();
        let meshes = 0;
        let triangles = 0;
        root?.traverse?.((node) => {
          if (!node?.isMesh) return;
          meshes += 1;
          if (node.geometry?.index?.count) {
            triangles += Math.floor(node.geometry.index.count / 3);
          } else if (node.geometry?.attributes?.position?.count) {
            triangles += Math.floor(node.geometry.attributes.position.count / 3);
          }
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.filter(Boolean).forEach((mat) => materialSet.add(mat));
        });
        meshCountEl.textContent = String(meshes);
        triCountEl.textContent = String(triangles);
        matCountEl.textContent = String(materialSet.size);
        materialsEl.innerHTML = Array.from(materialSet).map((mat) => {
          const color = mat.color?.getHexString ? '#' + mat.color.getHexString() : '-';
          return '<div class="material"><div class="name">' + escapeHtml(mat.name || 'Unnamed') + '</div><div class="meta">' + escapeHtml(mat.type || '-') + ' · Color ' + escapeHtml(color) + ' · Map ' + (mat.map ? 'yes' : 'no') + '</div></div>';
        }).join('') || '<div class="material"><div class="meta">No material data.</div></div>';
      }

      function escapeHtml(value) {
        return String(value || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
      }

      function disposeMaterial(material) {
        if (!material) return;
        for (const key of Object.keys(material)) {
          const value = material[key];
          if (value && typeof value === 'object' && typeof value.dispose === 'function') {
            value.dispose();
          }
        }
        material.dispose?.();
      }

      function disposeObject(root) {
        root?.traverse?.((node) => {
          node.geometry?.dispose?.();
          if (Array.isArray(node.material)) {
            node.material.forEach(disposeMaterial);
          } else {
            disposeMaterial(node.material);
          }
        });
      }

      function frameModel(root) {
        const box = new THREE.Box3().setFromObject(root);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        if (!Number.isFinite(size.x + size.y + size.z) || box.isEmpty()) {
          camera.position.set(5, 5, 5);
          controls.target.set(0, 0, 0);
          controls.update();
          return;
        }
        root.position.sub(center);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const fov = camera.fov * Math.PI / 180;
        const distY = (size.y / 2) / Math.tan(fov / 2);
        const distX = (size.x / 2) / (Math.tan(fov / 2) * camera.aspect);
        const distance = Math.max(Math.max(distY, distX) * 1.5, maxDim * 1.2, 2);
        camera.position.set(distance, distance, distance);
        camera.near = Math.max(distance / 100, 0.01);
        camera.far = distance * 20;
        camera.updateProjectionMatrix();
        controls.target.set(0, 0, 0);
        controls.maxDistance = distance * 8;
        controls.update();
        renderer?.render(scene, camera);
      }

      async function waitForViewportSize() {
        for (let i = 0; i < 20; i += 1) {
          if (viewport.clientWidth > 10 && viewport.clientHeight > 10) return;
          await new Promise((resolve) => requestAnimationFrame(resolve));
        }
      }

      async function loadModel(url, extension) {
        let loadedObject = null;
        let animations = [];
        animationEnabled = false;
        animationActions = [];
        animationEl.disabled = true;
        animationEl.classList.remove('active');
        animationEl.textContent = 'Animation: Off';
        if (extension === 'gltf' || extension === 'glb') {
          const gltf = await new GLTFLoader().loadAsync(url);
          loadedObject = gltf.scene;
          animations = gltf.animations || [];
        } else if (extension === 'fbx') {
          loadedObject = await new FBXLoader().loadAsync(url);
          animations = loadedObject.animations || [];
        } else if (extension === 'obj') {
          loadedObject = await new OBJLoader().loadAsync(url);
        } else {
          throw new Error('Unsupported format: ' + extension);
        }
        if (model) {
          scene.remove(model);
          disposeObject(model);
        }
        if (mixer) {
          mixer.stopAllAction();
          mixer = null;
        }
        model = loadedObject;
        scene.add(model);
        if (animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          animationActions = animations.map((clip) => {
            const action = mixer.clipAction(clip);
            action.enabled = true;
            action.paused = true;
            action.play();
            return action;
          });
          mixer.setTime(0);
          animationEl.disabled = false;
          animationEl.textContent = `Animation: Off (${animations.length})`;
        }
        applyWireframe(model, wireframe);
        frameModel(model);
        inspect(model);
        renderer?.render(scene, camera);
      }

      async function boot() {
        initScene();
        await waitForViewportSize();
        resize();
        animate();
        const context = await window.WebOS.ready();
        const launchData = context?.app?.launchData || {};
        const file = launchData?.fileContext?.file || {};
        const grant = launchData?.fileContext?.permissionContext || {};
        const path = file.path || launchData.path || '';
        const grantId = grant.grantId || '';
        const extension = extOf(path);
        fileName = file.name || path.split('/').pop() || 'model';
        titleEl.textContent = fileName;
        rawUrl = window.WebOS.files.rawUrl({ path, grantId });
        if (!rawUrl) throw new Error('File path or grant is missing.');
        downloadEl.href = rawUrl;
        downloadEl.download = fileName;
        setStatus('Loading ' + fileName + '...');
        await loadModel(rawUrl, extension);
        setStatus('');
      }

      function cleanup() {
        if (disposed) return;
        disposed = true;
        if (frameId) cancelAnimationFrame(frameId);
        frameId = null;
        resizeObserver?.disconnect?.();
        resizeObserver = null;
        mixer?.stopAllAction?.();
        mixer = null;
        if (model) {
          scene?.remove?.(model);
          disposeObject(model);
          model = null;
        }
        controls?.dispose?.();
        controls = null;
        animationActions = [];
        renderer?.dispose?.();
        renderer?.forceContextLoss?.();
        renderer?.domElement?.remove?.();
        renderer = null;
      }

      wireframeEl.addEventListener('click', () => {
        wireframe = !wireframe;
        wireframeEl.classList.toggle('active', wireframe);
        applyWireframe(model, wireframe);
      });
      axesEl.addEventListener('click', () => {
        axesVisible = !axesVisible;
        axesEl.classList.toggle('active', axesVisible);
        if (axes) axes.visible = axesVisible;
      });
      animationEl.addEventListener('click', () => {
        if (!mixer || animationActions.length === 0) return;
        animationEnabled = !animationEnabled;
        animationActions.forEach((action) => {
          action.paused = !animationEnabled;
        });
        animationEl.classList.toggle('active', animationEnabled);
        animationEl.textContent = animationEnabled ? `Animation: On (${animationActions.length})` : `Animation: Off (${animationActions.length})`;
        if (!animationEnabled) {
          mixer.setTime(0);
          frameModel(model);
        }
      });
      fitEl.addEventListener('click', () => model && frameModel(model));
      shotEl.addEventListener('click', () => {
        renderer.render(scene, camera);
        const link = document.createElement('a');
        link.href = renderer.domElement.toDataURL('image/png');
        link.download = fileName.replace(/\.[^.]+$/, '') + '-snapshot.png';
        link.click();
      });
      window.addEventListener('resize', resize);
      window.addEventListener('pagehide', cleanup);
      window.addEventListener('beforeunload', cleanup);
      boot().catch((err) => setStatus(err?.message || 'Failed to open model.', true));
    </script>
  </body>
</html>
