<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>모델 뷰어</title>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
    <style>
      :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
      body { margin: 0; height: 100vh; overflow: hidden; background: #050816; color: #e5e7eb; }
      #viewport { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      .toolbar { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; max-width: calc(100vw - 24px); padding: 8px 12px; border: 1px solid rgba(148, 163, 184, .28); border-radius: 14px; background: rgba(15, 23, 42, .78); backdrop-filter: blur(14px); box-shadow: 0 18px 55px rgba(0,0,0,.35); }
      .title { max-width: min(44vw, 520px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 800; }
	      button, a { border: 1px solid rgba(125, 211, 252, .55); border-radius: 10px; background: rgba(14, 116, 144, .78); color: white; padding: 7px 10px; text-decoration: none; cursor: pointer; font-size: 12px; }
	      button.active { background: #2563eb; border-color: #93c5fd; }
	      button:disabled { opacity: .45; cursor: not-allowed; }
	      .anim-status { border: 1px solid rgba(148, 163, 184, .26); border-radius: 999px; padding: 6px 9px; background: rgba(15, 23, 42, .72); color: #bfdbfe; font-size: 12px; white-space: nowrap; }
      .panel { position: fixed; top: 14px; right: 14px; width: min(340px, calc(100vw - 28px)); max-height: calc(100vh - 110px); overflow: auto; padding: 12px; border: 1px solid rgba(148, 163, 184, .28); border-radius: 16px; background: rgba(15, 23, 42, .78); backdrop-filter: blur(14px); box-shadow: 0 18px 55px rgba(0,0,0,.35); }
      .panel h2 { margin: 0 0 10px; font-size: 15px; }
      .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
      .metric { padding: 8px; border-radius: 10px; background: rgba(15, 23, 42, .72); border: 1px solid rgba(148, 163, 184, .22); }
      .metric span { display: block; font-size: 11px; color: #94a3b8; }
      .metric strong { font-size: 18px; }
      .material { border-top: 1px solid rgba(148, 163, 184, .18); padding: 8px 0; }
      .material .name { font-weight: 700; font-size: 12px; }
      .material .meta { color: #94a3b8; font-size: 11px; word-break: break-word; }
      .overlay { position: fixed; inset: 0; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(30, 64, 175, .28), rgba(2, 6, 23, .85)); }
      .card { width: min(560px, calc(100vw - 36px)); border: 1px solid rgba(148, 163, 184, .28); border-radius: 18px; padding: 22px; background: rgba(15, 23, 42, .82); text-align: center; }
      .error { color: #fca5a5; }
    </style>
  </head>
  <body>
    <div id="viewport"></div>
    <aside class="panel" id="panel">
      <h2>검사</h2>
      <div class="metrics">
        <div class="metric"><span>메시</span><strong id="mesh-count">0</strong></div>
        <div class="metric"><span>삼각형</span><strong id="tri-count">0</strong></div>
        <div class="metric"><span>재질</span><strong id="mat-count">0</strong></div>
      </div>
      <div id="materials"></div>
    </aside>
    <div class="toolbar">
	      <div class="title" id="title">모델 뷰어</div>
	      <button id="wireframe">와이어프레임</button>
	      <button id="axes" class="active">축</button>
	      <span class="anim-status" id="animation-status">애니메이션: 없음</span>
	      <button id="anim-play" disabled>재생</button>
	      <button id="anim-pause" disabled>일시정지</button>
	      <button id="anim-stop" disabled>정지</button>
	      <button id="fit" title="보이는 메시 경계에 맞춰 카메라를 재정렬">메시 맞춤</button>
      <button id="home" title="현재 모델 중심으로 카메라를 초기화">홈 뷰</button>
      <button id="reset" title="렌더러를 다시 만들고 현재 모델을 재로딩">렌더러 초기화</button>
      <button id="shot">스크린샷</button>
      <a id="download" href="#" download>다운로드</a>
    </div>
    <div class="overlay" id="overlay"><div class="card" id="status">파일 컨텍스트를 기다리는 중...</div></div>
    <script src="/api/sandbox/sdk.js" crossorigin="anonymous"></script>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
      import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

      const viewport = document.getElementById('viewport');
      const overlay = document.getElementById('overlay');
      const statusEl = document.getElementById('status');
      const titleEl = document.getElementById('title');
      const meshCountEl = document.getElementById('mesh-count');
      const triCountEl = document.getElementById('tri-count');
      const matCountEl = document.getElementById('mat-count');
	      const materialsEl = document.getElementById('materials');
	      const wireframeEl = document.getElementById('wireframe');
	      const axesEl = document.getElementById('axes');
	      const animationStatusEl = document.getElementById('animation-status');
	      const animPlayEl = document.getElementById('anim-play');
	      const animPauseEl = document.getElementById('anim-pause');
	      const animStopEl = document.getElementById('anim-stop');
      const fitEl = document.getElementById('fit');
      const homeEl = document.getElementById('home');
      const resetEl = document.getElementById('reset');
      const shotEl = document.getElementById('shot');
      const downloadEl = document.getElementById('download');

      let scene;
      let camera;
      let renderer;
      let controls;
      let model;
      let mixer;
      let axes;
      let frameId;
      let resizeObserver;
      let disposed = false;
      let rawUrl = '';
      let fileName = 'model';
	      let wireframe = false;
	      let axesVisible = true;
	      let animationEnabled = false;
	      let animationState = 'stopped';
	      let animationActions = [];
      let loadToken = 0;
      let currentLaunchData = null;
      let lastFrameTime = 0;

      function setStatus(message, error = false) {
        statusEl.textContent = message;
        statusEl.className = error ? 'card error' : 'card';
        overlay.style.display = message ? 'grid' : 'none';
      }

      function extOf(path) {
        const name = String(path || '').split('/').pop() || '';
        return name.includes('.') ? name.split('.').pop().toLowerCase() : '';
      }

      function shouldSuppressFbxWarning(args) {
        const message = String(args?.[0] || '');
        return message.includes('THREE.FBXLoader: unknown material type');
      }

      async function withSuppressedFbxWarnings(operation) {
        const originalWarn = console.warn;
        console.warn = (...args) => {
          if (shouldSuppressFbxWarning(args)) return;
          originalWarn.apply(console, args);
        };
        try {
          return await operation();
        } finally {
          console.warn = originalWarn;
        }
      }

      function initScene() {
        disposed = false;
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050816);
        camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        camera.position.set(5, 5, 5);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.shadowMap.enabled = true;
        viewport.appendChild(renderer.domElement);
        resizeObserver = new ResizeObserver(() => resize());
        resizeObserver.observe(viewport);
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0xffffff, 0.62));
        const key = new THREE.DirectionalLight(0xffffff, 1.1);
        key.position.set(5, 10, 7.5);
        key.castShadow = true;
        scene.add(key);
        const hemi = new THREE.HemisphereLight(0xdbeafe, 0x1e293b, 0.45);
        scene.add(hemi);
        axes = new THREE.AxesHelper(2.5);
        scene.add(axes);
        resize();
      }

      function resize() {
        if (!renderer || !camera) return;
        const width = Math.max(1, viewport.clientWidth);
        const height = Math.max(1, viewport.clientHeight);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height, false);
      }

      function animate() {
        if (disposed) return;
        frameId = requestAnimationFrame(animate);
        const now = performance.now();
        const delta = lastFrameTime ? Math.min((now - lastFrameTime) / 1000, 0.1) : 0;
        lastFrameTime = now;
        if (animationEnabled && mixer) mixer.update(delta);
        controls?.update();
        if (renderer && scene && camera) renderer.render(scene, camera);
      }

      function startRenderLoop() {
        if (frameId || disposed) return;
        lastFrameTime = performance.now();
        animate();
      }

      function stopRenderLoop() {
        if (frameId) cancelAnimationFrame(frameId);
        frameId = null;
      }

      function applyWireframe(root, enabled) {
        root?.traverse?.((node) => {
          if (!node?.isMesh || !node.material) return;
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach((material) => {
            if ('wireframe' in material) {
              material.wireframe = enabled;
              material.needsUpdate = true;
            }
          });
        });
      }

      function inspect(root) {
        const materialSet = new Set();
        let meshes = 0;
        let triangles = 0;
        root?.traverse?.((node) => {
          if (!node?.isMesh) return;
          meshes += 1;
          if (node.geometry?.index?.count) {
            triangles += Math.floor(node.geometry.index.count / 3);
          } else if (node.geometry?.attributes?.position?.count) {
            triangles += Math.floor(node.geometry.attributes.position.count / 3);
          }
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.filter(Boolean).forEach((mat) => materialSet.add(mat));
        });
        meshCountEl.textContent = String(meshes);
        triCountEl.textContent = String(triangles);
        matCountEl.textContent = String(materialSet.size);
        materialsEl.innerHTML = Array.from(materialSet).map((mat) => {
          const color = mat.color?.getHexString ? '#' + mat.color.getHexString() : '-';
          return '<div class="material"><div class="name">' + escapeHtml(mat.name || '이름 없음') + '</div><div class="meta">' + escapeHtml(mat.type || '-') + ' · 색상 ' + escapeHtml(color) + ' · 맵 ' + (mat.map ? '있음' : '없음') + '</div></div>';
        }).join('') || '<div class="material"><div class="meta">재질 정보가 없습니다.</div></div>';
      }

      function escapeHtml(value) {
        return String(value || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
      }

      function disposeMaterial(material) {
        if (!material) return;
        for (const key of Object.keys(material)) {
          const value = material[key];
          if (value && typeof value === 'object' && typeof value.dispose === 'function') {
            value.dispose();
          }
        }
        material.dispose?.();
      }

      function disposeObject(root) {
        root?.traverse?.((node) => {
          node.skeleton?.dispose?.();
          node.geometry?.dispose?.();
          if (Array.isArray(node.material)) {
            node.material.forEach(disposeMaterial);
          } else {
            disposeMaterial(node.material);
          }
        });
      }

	      function resetInspection() {
	        meshCountEl.textContent = '0';
	        triCountEl.textContent = '0';
	        matCountEl.textContent = '0';
	        materialsEl.innerHTML = '';
	      }

	      function updateAnimationControls(enabled = false, state = 'stopped', count = 0) {
	        animationState = state;
	        animationStatusEl.textContent = enabled ? `애니메이션: ${state} (${count})` : '애니메이션: 없음';
	        animPlayEl.disabled = !enabled || state === 'playing';
	        animPauseEl.disabled = !enabled || state !== 'playing';
	        animStopEl.disabled = !enabled || state === 'stopped';
	        animPlayEl.classList.toggle('active', enabled && state === 'playing');
	        animPauseEl.classList.toggle('active', enabled && state === 'paused');
	        animStopEl.classList.toggle('active', enabled && state === 'stopped');
	      }

	      function resetAnimationState() {
	        mixer?.stopAllAction?.();
	        mixer = null;
	        animationActions = [];
	        animationEnabled = false;
	        updateAnimationControls(false);
	      }

	      function playAnimation() {
	        if (!mixer || animationActions.length === 0) return;
	        animationActions.forEach((action) => {
	          action.enabled = true;
	          action.paused = false;
	          action.play();
	        });
	        animationEnabled = true;
	        updateAnimationControls(true, 'playing', animationActions.length);
	      }

	      function pauseAnimation() {
	        if (!mixer || animationActions.length === 0) return;
	        animationActions.forEach((action) => {
	          action.paused = true;
	        });
	        animationEnabled = false;
	        updateAnimationControls(true, 'paused', animationActions.length);
	        renderer?.render(scene, camera);
	      }

	      function stopAnimation() {
	        if (!mixer || animationActions.length === 0) return;
	        mixer.stopAllAction();
	        animationActions.forEach((action) => {
	          action.reset();
	          action.enabled = true;
	          action.paused = true;
	          action.play();
	        });
	        mixer.setTime(0);
	        animationEnabled = false;
	        updateAnimationControls(true, 'stopped', animationActions.length);
	        frameModel(model);
	      }

      function disposeCurrentModel() {
        resetAnimationState();
        if (model) {
          scene?.remove?.(model);
          disposeObject(model);
          model = null;
        }
        resetInspection();
      }

      function releaseViewer(final = false) {
        if (final) disposed = true;
        stopRenderLoop();
        resizeObserver?.disconnect?.();
        resizeObserver = null;
        disposeCurrentModel();
        controls?.dispose?.();
        controls = null;
        axes = null;
        if (renderer) {
          renderer.dispose?.();
          renderer.forceContextLoss?.();
          renderer.domElement?.remove?.();
          renderer = null;
        }
        scene = null;
        camera = null;
        lastFrameTime = 0;
      }

      function computeMeshBox(root) {
        const box = new THREE.Box3();
        let hasMesh = false;
        root?.updateWorldMatrix?.(true, true);
        root?.traverse?.((node) => {
          if (!node?.isMesh) return;
          const geometry = node.geometry;
          if (!geometry) return;
          if (!geometry.boundingBox) geometry.computeBoundingBox();
          if (!geometry.boundingBox) return;
          const meshBox = geometry.boundingBox.clone().applyMatrix4(node.matrixWorld);
          if (!Number.isFinite(meshBox.min.x + meshBox.min.y + meshBox.min.z + meshBox.max.x + meshBox.max.y + meshBox.max.z)) return;
          box.union(meshBox);
          hasMesh = true;
        });
        return hasMesh ? box : new THREE.Box3().setFromObject(root);
      }

      function frameModel(root) {
        if (!root || !camera || !controls) return;
        const box = new THREE.Box3().setFromObject(root);
        const meshBox = computeMeshBox(root);
        if (!meshBox.isEmpty()) box.copy(meshBox);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        if (!Number.isFinite(size.x + size.y + size.z) || box.isEmpty()) {
          camera.position.set(5, 5, 5);
          controls.target.set(0, 0, 0);
          controls.update();
          return;
        }
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const fov = camera.fov * Math.PI / 180;
        const fitHeightDistance = (size.y / 2) / Math.tan(fov / 2);
        const fitWidthDistance = (size.x / 2) / (Math.tan(fov / 2) * camera.aspect);
        const distance = Math.max(fitHeightDistance, fitWidthDistance, maxDim) * 1.8;
        const direction = new THREE.Vector3(1, 0.85, 1).normalize();
        camera.position.copy(center).addScaledVector(direction, Math.max(distance, 2));
        camera.near = Math.max(distance / 100, 0.01);
        camera.far = Math.max(distance * 20, maxDim * 20, 1000);
        camera.updateProjectionMatrix();
        controls.target.copy(center);
        controls.minDistance = Math.max(distance / 100, 0.01);
        controls.maxDistance = distance * 8;
        controls.update();
        renderer?.render(scene, camera);
      }

      function homeView() {
        if (!model) return;
        frameModel(model);
      }

      async function waitForViewportSize() {
        for (let i = 0; i < 20; i += 1) {
          if (viewport.clientWidth > 10 && viewport.clientHeight > 10) return;
          await new Promise((resolve) => requestAnimationFrame(resolve));
        }
      }

      async function ensureSceneReady() {
        if (!scene || !camera || !renderer || !controls) {
          initScene();
        }
        await waitForViewportSize();
        resize();
        startRenderLoop();
      }

      async function loadModel(url, extension, token) {
        let loadedObject = null;
        let animations = [];
        resetAnimationState();
        const cacheBustedUrl = url + (url.includes('?') ? '&' : '?') + 'viewerLoad=' + encodeURIComponent(String(token) + '-' + Date.now());
        if (extension === 'gltf' || extension === 'glb') {
          const gltf = await new GLTFLoader().loadAsync(cacheBustedUrl);
          loadedObject = gltf.scene;
          animations = gltf.animations || [];
        } else if (extension === 'fbx') {
          loadedObject = await withSuppressedFbxWarnings(() => new FBXLoader().loadAsync(cacheBustedUrl));
          animations = loadedObject.animations || [];
        } else if (extension === 'obj') {
          loadedObject = await new OBJLoader().loadAsync(cacheBustedUrl);
        } else {
          throw new Error('지원하지 않는 형식입니다: ' + extension);
        }
        if (token !== loadToken || disposed) {
          disposeObject(loadedObject);
          return;
        }
        model = loadedObject;
        scene.add(model);
	        if (animations.length > 0) {
	          mixer = new THREE.AnimationMixer(model);
	          animationActions = animations.map((clip) => {
	            const action = mixer.clipAction(clip);
	            action.enabled = true;
	            action.paused = true;
	            action.reset();
	            action.play();
	            return action;
	          });
	          mixer.setTime(0);
	          updateAnimationControls(true, 'stopped', animations.length);
	        }
        applyWireframe(model, wireframe);
        frameModel(model);
        inspect(model);
        renderer?.render(scene, camera);
      }

      async function loadFromLaunchData(launchData) {
        const token = ++loadToken;
        currentLaunchData = launchData || null;
        const file = launchData?.fileContext?.file || {};
        const grant = launchData?.fileContext?.permissionContext || {};
        const path = file.path || launchData.path || '';
        const grantId = grant.grantId || '';
        const extension = extOf(path);
        fileName = file.name || path.split('/').pop() || 'model';
        titleEl.textContent = fileName;
        rawUrl = window.WebOS.files.rawUrl({ path, grantId });
        if (!rawUrl) throw new Error('파일 경로 또는 권한이 없습니다.');
        downloadEl.href = rawUrl;
        downloadEl.download = fileName;
        setStatus(fileName + ' 불러오는 중...');
        await ensureSceneReady();
        if (token !== loadToken || disposed) return;
        disposeCurrentModel();
        await loadModel(rawUrl, extension, token);
        if (token === loadToken && !disposed) setStatus('');
      }

      async function boot() {
        const context = await window.WebOS.ready();
        await loadFromLaunchData(context?.app?.launchData || {});
      }

      function cleanup() {
        if (disposed) return;
        releaseViewer(true);
      }

      window.addEventListener('message', (event) => {
        const payload = event.data && typeof event.data === 'object' ? event.data : {};
        if (payload.type === 'webos:dispose') {
          cleanup();
        } else if (payload.type === 'webos:launch-data') {
          loadFromLaunchData(payload.launchData || {}).catch((err) => setStatus(err?.message || '모델을 열지 못했습니다.', true));
        }
      });

      wireframeEl.addEventListener('click', () => {
        wireframe = !wireframe;
        wireframeEl.classList.toggle('active', wireframe);
        applyWireframe(model, wireframe);
      });
      axesEl.addEventListener('click', () => {
        axesVisible = !axesVisible;
        axesEl.classList.toggle('active', axesVisible);
        if (axes) axes.visible = axesVisible;
      });
	      animPlayEl.addEventListener('click', playAnimation);
	      animPauseEl.addEventListener('click', pauseAnimation);
	      animStopEl.addEventListener('click', stopAnimation);
      fitEl.addEventListener('click', () => model && frameModel(model));
      homeEl.addEventListener('click', homeView);
      resetEl.addEventListener('click', () => {
        if (!currentLaunchData) return;
        releaseViewer(false);
        loadFromLaunchData(currentLaunchData).catch((err) => setStatus(err?.message || '렌더러 초기화에 실패했습니다.', true));
      });
      shotEl.addEventListener('click', () => {
        if (!renderer) return;
        renderer.render(scene, camera);
        const link = document.createElement('a');
        link.href = renderer.domElement.toDataURL('image/png');
        link.download = fileName.replace(/\.[^.]+$/, '') + '-snapshot.png';
        link.click();
      });
      window.addEventListener('resize', resize);
      window.addEventListener('pagehide', cleanup);
      window.addEventListener('beforeunload', cleanup);
      boot().catch((err) => setStatus(err?.message || '모델을 열지 못했습니다.', true));
    </script>
  </body>
</html>
